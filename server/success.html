<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | SocialGrow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { primary: { 500: '#6491ff', 600: '#5074cc' } }
                }
            }
        }
    </script>
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
    <div class="text-center p-8 max-w-md">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-check text-4xl text-green-500"></i>
        </div>
        <h1 class="text-3xl font-bold text-slate-900 mb-4">Payment Successful!</h1>
        <p class="text-slate-600 mb-8">Thank you for your purchase. Your order is being processed and you will receive a confirmation on WhatsApp shortly.</p>

        <div class="bg-white rounded-2xl p-6 shadow-lg mb-8">
            <p class="text-sm text-slate-500 mb-2">Order ID</p>
            <p id="order-id" class="font-mono font-bold text-lg">Loading...</p>
        </div>

        <a href="https://wa.me/258834592663" class="inline-flex items-center space-x-2 bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 transition">
            <i class="fab fa-whatsapp"></i>
            <span>Contact Support</span>
        </a>

        <a href="/" class="block mt-4 text-slate-500 hover:text-primary-600">← Back to Home</a>
    </div>

    <script>
        // Extract order ID from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (token) {
            // Call capture API
            fetch('/api/capture-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            })
            .then(res => res.json())
            .then(data => {
                if (data.orderId) {
                    document.getElementById('order-id').textContent = data.orderId;
                }
            })
            .catch(err => {
                console.log('Order processing...');
            });
        }
    </script>
</body>
</html>
